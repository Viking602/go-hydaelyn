[constraints]
min_quality = 0.60
min_modularity = 0.30
min_acyclicity = 1.00
min_depth = 0.55
min_equality = 0.50
min_redundancy = 0.75
max_cycles = 0
max_cc = 35
max_fn_lines = 140
max_file_lines = 1300
max_coupling_score = 0.35
max_upward_violations = 0
no_god_files = true

[[layers]]
name = "foundation"
paths = [
  "auth/*",
  "hook/*",
  "program/*",
  "provider/*",
  "tool/*"
]
order = 0

[[layers]]
name = "model"
paths = [
  "blackboard/*",
  "message/*",
  "session/*",
  "team/*",
  "workflow/*"
]
order = 2

[[layers]]
name = "runtime"
paths = [
  "agent/*",
  "capability/*",
  "middleware/*",
  "observe/*",
  "patterns/*",
  "plugin/*",
  "providers/*",
  "scheduler/*",
  "storage/*",
  "toolkit/*",
  "tooltest/*"
]
order = 1

[[layers]]
name = "entry"
paths = [
  "host/*",
  "transport/*"
]
order = 0
