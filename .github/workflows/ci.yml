name: ci

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  core-test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Verify module path
        run: |
          test "$(go list -m)" = "github.com/Viking602/go-hydaelyn"

      - name: Run tests
        run: go test ./...

      - name: Run race tests
        run: go test -race -timeout=10m ./...

      - name: Run coverage tests
        run: go test ./... -coverprofile=coverage.out

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out
          if-no-files-found: error
          retention-days: 30

  static-analysis:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install analysis tools
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          go install golang.org/x/vuln/cmd/govulncheck@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        run: staticcheck ./...

      - name: Run govulncheck
        run: govulncheck ./...

  eval-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run deterministic eval suite
        run: go test ./evaluation/... -run 'TestDeterministicEval' -count=1 -v

      - name: Run safety critical tests
        run: go test ./evaluation/... -run 'TestSafetyCritical' -count=1 -v

      - name: Run replay invariant tests
        run: go test ./evaluation/... -run 'TestReplayInvariant' -count=1 -v

      - name: Run release gate tests
        run: go test ./evaluation/... -run 'TestReleaseGate' -count=1 -v

      - name: Upload eval artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eval-artifacts
          path: |
            **/score.json
            **/summary.md
            **/evaluation_report.json
            **/policy_outcomes.json
          if-no-files-found: ignore
          retention-days: 90

  release-soak:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run repeatability soak
        run: go test ./... -count=20

      - name: Run race soak
        run: go test -race -timeout=10m ./... -count=5
